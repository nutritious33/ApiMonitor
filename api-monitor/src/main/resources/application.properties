# ── Common settings (all profiles) ──────────────────────────────────────────
spring.application.name=api-monitor

# Disable open-in-view — avoids lazy-loading DB queries during serialization (not needed for REST)
spring.jpa.open-in-view=false

# Scheduled health-check interval in milliseconds (override via env MONITOR_CHECK_INTERVAL_MS)
monitor.check-interval-ms=60000

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS — override in prod via CORS_ALLOWED_ORIGINS environment variable
cors.allowed-origins=http://localhost:8080,http://localhost:5173

# Per-IP rate limiter — max requests per 60-second window (override via env if needed)
rate-limit.requests-per-minute=120
