# ── Common settings (all profiles) ──────────────────────────────────────────
spring.application.name=api-monitor

# Disable open-in-view — avoids lazy-loading DB queries during serialization (not needed for REST)
spring.jpa.open-in-view=false

# Scheduled health-check interval in milliseconds (override via env MONITOR_CHECK_INTERVAL_MS)
monitor.check-interval-ms=60000

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS — override in prod via CORS_ALLOWED_ORIGINS environment variable
cors.allowed-origins=http://localhost:8080,http://localhost:5173

# API key — fallback for unprofiledlocal runs (e.g. mvn spring-boot:run with no
# -Dspring.profiles.active flag). The dev profile overrides this with the same
# value; the prod profile overrides it with ${API_SECURITY_KEY} from the environment.
# WARNING: this default is intentionally weak — never deploy without setting the env var.
api.security.key=dev-api-key

# Per-IP rate limiter — max requests per 60-second window (override via env if needed)
rate-limit.requests-per-minute=120
# Trust proxy IP headers (CF-Connecting-IP, X-Forwarded-For) for rate-limit key resolution.
# Set to true ONLY when ALL traffic arrives through a trusted reverse proxy (e.g. Cloudflare
# Tunnel with port 8080 not exposed on the host). When false, the raw TCP remote address is
# used — header spoofing is impossible but rate limiting becomes per-remoteAddr rather than
# per real client IP. Override to true in application-prod.properties.
rate-limit.trust-proxy=false

# Maximum number of user-submitted custom endpoints allowed globally
monitor.max-custom-endpoints=10

# ── Email notifications (all optional — leave blank to disable) ───────────────
# If MAIL_HOST is unset, Spring Boot will not create a JavaMailSender bean and
# EmailNotificationService will skip sending silently.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Recipient for new-submission alerts. Leave blank to disable notifications.
monitor.mail.to=${MAIL_TO:}
monitor.mail.from=${MAIL_USERNAME:noreply@apimonitor.local}
