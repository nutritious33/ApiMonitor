# ── Prod profile: PostgreSQL, H2 console disabled ────────────────────────────
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
# Hibernate must not alter the schema — Flyway owns all schema changes in prod.
spring.jpa.hibernate.ddl-auto=none

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
# baseline-on-migrate lets Flyway coexist with a DB whose schema was previously
# created by Hibernate ddl-auto=update (marks the existing state as baseline v0).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.h2.console.enabled=false

logging.level.com.example.apimonitor=INFO
logging.level.root=WARN

# Set via environment variable in docker-compose / K8s
api.security.key=${API_SECURITY_KEY}

# Disable Swagger UI in production (API docs are for development only)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
