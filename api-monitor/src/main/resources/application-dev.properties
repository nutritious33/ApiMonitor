# ── Dev profile: H2 in-memory database, console enabled ─────────────────────
# WARNING: Never expose a dev instance to the internet — the API key below is
# a well-known public string. Always run behind a firewall or localhost only.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=dev-only-password
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway is not needed in dev — Hibernate create-drop manages the H2 schema.
spring.flyway.enabled=false

logging.level.com.example.apimonitor=DEBUG

# API key for local development (override in prod via API_SECURITY_KEY env var)
api.security.key=dev-api-key
