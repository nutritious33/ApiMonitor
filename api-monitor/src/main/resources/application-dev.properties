# ── Dev profile: H2 in-memory database, console enabled ─────────────────────
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=dev-only-password
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.example.apimonitor=DEBUG

# API key for local development (override in prod via API_SECURITY_KEY env var)
api.security.key=dev-api-key
