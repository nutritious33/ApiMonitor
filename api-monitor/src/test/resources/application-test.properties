# ── Test profile: H2 in-memory, no console, fixed API key ────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=test-password
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.enabled=false

# Flyway is not needed in tests — Hibernate create-drop manages the H2 schema.
spring.flyway.enabled=false

api.security.key=test-api-key

monitor.check-interval-ms=60000
