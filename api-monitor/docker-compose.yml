services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: apimonitor
      POSTGRES_USER: ${DATASOURCE_USERNAME:-apimonitor}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d apimonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-monitor:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/apimonitor
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME:-apimonitor}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      API_SECURITY_KEY: ${SECRET_SECURITY_KEY}
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      # ── Email notifications (optional — omit or leave blank to disable) ─────
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_TO: ${MAIL_TO:-}
    networks:
      - monitor-net

  cloudflared:
    image: cloudflare/cloudflared:2025.4.0
    container_name: cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - api-monitor
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - monitor-net

volumes:
  postgres-data:

networks:
  monitor-net:
    driver: bridge
