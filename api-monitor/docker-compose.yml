services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: apimonitor
      POSTGRES_USER: ${DATASOURCE_USERNAME:-apimonitor}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d apimonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-monitor:
    build:
      context: .
      args:
        # Bakes the API key into the React bundle at build time.
        # Docker Compose reads SECRET_SECURITY_KEY from .env automatically.
        #
        # KEY ROTATION: After changing SECRET_SECURITY_KEY in .env, rebuild with:
        #   docker compose build --no-cache && docker compose up -d
        VITE_API_KEY: ${SECRET_SECURITY_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/apimonitor
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME:-apimonitor}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      API_SECURITY_KEY: ${SECRET_SECURITY_KEY}
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
    networks:
      - monitor-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - api-monitor
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - monitor-net

volumes:
  postgres-data:

networks:
  monitor-net:
    driver: bridge