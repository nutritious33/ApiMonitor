name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests (backend only — frontend build skipped for speed)
        run: mvn -B test --no-transfer-progress
        working-directory: api-monitor

      - name: Build Docker image (multi-stage — compiles JAR + React bundle inside Docker)
        # VITE_API_KEY is passed via --build-arg. GitHub Actions automatically
        # redacts secret values from log output, so it won't appear in CI logs.
        # Add VITE_API_KEY to repo Settings → Secrets → Actions.
        run: |
          docker build \
            --build-arg VITE_API_KEY="${VITE_API_KEY}" \
            -t api-monitor:ci .
        working-directory: api-monitor
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: api-monitor/target/surefire-reports/
